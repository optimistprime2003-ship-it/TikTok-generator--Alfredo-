name: Generate TikTok Video

on:
  workflow_dispatch:
    inputs:
      video_prompt:
        description: 'Type video topic (e.g., "how does the brain work")'
        required: false
        default: 'How does the brain work'

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linux Video Software
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2" "moviepy<2" pillow requests edge-tts

      - name: Run Video Generator Script
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python main.py "${{ github.event.inputs.video_prompt }}"

      - name: Save and Deliver Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finished-tiktok-video
          path: output.mp4
          retention-days: 7
