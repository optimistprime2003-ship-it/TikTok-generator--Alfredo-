name: Generate TikTok Video

on:
  workflow_dispatch:
    inputs:
      video_prompt:
        description: 'Type your custom video script here (Leave blank for auto-AI text)'
        required: false
        default: ''

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Linux Video Software
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg envsubst

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install moviepy pillow numpy requests

      - name: Run Video Generator Script
        run: |
          python main.py "${{ github.event.inputs.video_prompt }}"

      - name: Save and Deliver Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finished-tiktok-video
          path: output.mp4
          retention-days: 7
